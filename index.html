<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foyer St Paul 19</title>
    <style>
        body { font-family: sans-serif; background-color: #f8f9fa; margin: 0; padding: 20px; text-align: center; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        #listeActivites { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-top: 20px; }
        .card { width: 250px; background: white; border: 1px solid #ddd; border-radius: 8px; overflow: hidden; position: relative; }
        .card img { width: 100%; height: auto; }
        .card-body { padding: 10px; }
        .badge-complet { position: absolute; top: 10px; left: 10px; background: red; color: white; padding: 5px 10px; font-weight: bold; border-radius: 5px; }
        footer { margin-top: 50px; padding: 20px; border-top: 1px solid #ddd; color: #666; }
        .compteur-img { margin-top: 10px; max-width: 150px; height: auto; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Activités du Foyer St Paul Corrèze</h1>
        <div id="listeActivites">
            </div>
    </div>

    <footer>
        <p>© <span id="annee"></span> Foyer St Paul 19</p>
        <img class="compteur-img" src="https://komarev.com/ghpvc/?username=foyer19-FoyerStPaul19&color=blue&style=flat&label=VISITES" alt="Compteur de visites">
    </footer>

    <script>
        // 1. Mise à jour de l'année
        document.getElementById('annee').textContent = new Date().getFullYear();

        // 2. Ta liste d'activités
        const mesActivites = [
            {
                titre: "Moules frites karaoké",
                image: "moulesfrites.jpg", // Remplace par le nom de ton image sur GitHub
                inscrits: 20,
                quota: 20
            }
        ];
            {
                titre: "Aligot saucisse",
                image: "aligot.jpg", // Remplace par le nom de ton image sur GitHub
                inscrits: 20,
                quota: 20
            }
        ];
        // 3. Affichage des activités
        const container = document.getElementById('listeActivites');
        mesActivites.forEach(act => {
            const complet = act.inscrits >= act.quota;
            container.innerHTML += `
                <div class="card">
                    ${complet ? '<div class="badge-complet">COMPLET</div>' : ''}
                    <img src="${act.image}" alt="${act.titre}">
                    <div class="card-body">
                        <h3>${act.titre}</h3>
                        <p>Places : ${act.inscrits} / ${act.quota}</p>
                    </div>
                </div>
            `;
        });
    </script>
</body>
</html>
